[project]
name = "yohane"
version = "2024.10.8-dev"
description = "Forced alignment for karaokes"
readme = "README.md"
license = { file = "LICENSE" }
authors = [
    { name = "NextFire", email = "git@yuru.moe" },
    { name = "Voltini", email = "slimen3@hotmail.fr" },
]
requires-python = ">=3.10"
dependencies = [
    "pysubs2==1.7.3",
    "regex==2024.9.11",
    "typer-slim[standard]==0.12.5",
    "pyright==1.1.384",
    "ruff==0.6.9",
]

[tool.pixi.project]
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[tool.pixi.dependencies]
pytorch = { version = ">=2.1,<3", channel = "pytorch" }
torchaudio = { version = ">=2.1,<3", channel = "pytorch" }
ffmpeg = ">=4.4,<7"
numpy = ">=1,<2"

[tool.pixi.pypi-dependencies]
yohane = { path = ".", editable = true }
vocal-remover = { git = "https://github.com/Japan7/vocal-remover.git", branch = "6.0.0b4" }

[tool.pixi.tasks]
yohane = "python3 -m yohane_cli"
pyright = "pyright"
ruff = "ruff"

[project.urls]
Homepage = "https://github.com/Japan7/yohane"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pyright]
pythonVersion = "3.10"
reportDeprecated = true

[tool.ruff]
exclude = ["notebook"]

[tool.ruff.lint]
extend-select = ["I"]
