trainer:
  max_epochs: 200
  log_every_n_steps: 10
  precision: bf16-mixed
  gradient_clip_val: 1.0
  accumulate_grad_batches: 4
  callbacks:
    - class_path: LearningRateMonitor
    - class_path: EarlyStopping
      init_args:
        monitor: val_frame_accuracy
        mode: max
  logger:
    - class_path: TensorBoardLogger
      init_args:
        save_dir: .
    - class_path: yohane_fa.logger.TrackioLogger
      init_args:
        project: yohane-fa

model:
  d_model: 1024
  num_layers: 8
  num_heads: 16
  num_kv_heads: 4
  kernel_size: 31
  swa_window_size: 500
  gradient_checkpointing: true

data:
  dataset_path: NextFire/karaoke-mugen-alignments
  batch_size: 8

optimizer:
  class_path: AdamW
  init_args:
    lr: 1e-3
    weight_decay: 1e-2

lr_scheduler:
  class_path: CosineAnnealingLR
  init_args:
    T_max: 200
