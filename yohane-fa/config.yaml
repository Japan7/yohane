trainer:
  max_epochs: 100
  log_every_n_steps: 10
  callbacks:
    - class_path: EarlyStopping
      init_args:
        monitor: val_frame_accuracy
        mode: max
  logger:
    - class_path: TensorBoardLogger
      init_args:
        save_dir: .
    - class_path: yohane_fa.logger.TrackioLogger
      init_args:
        project: yohane-fa

model:
  dropout: 0.05
  dampening_factor: 0.5
  label_smoothing: 0.1

data:
  dataset_path: NextFire/karaoke-alignments
  batch_size: 48
  num_workers: 4

optimizer:
  class_path: AdamW
  init_args:
    lr: 5e-4
    weight_decay: 1e-2

lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val_loss
    factor: 0.5
    patience: 5
