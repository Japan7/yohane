[workspace]
name = "yohane"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[system-requirements]
macos = "14.0"

[dependencies]
python = "~=3.15.0b4"
ffmpeg = "~=8.0"

[pypi-dependencies]
torch = "==2.13.0"
torchaudio = "==2.11.0"
torchcodec = "==0.14.0"
yohane = { path = ".", editable = true }
yohane-cli = { path = "yohane-cli", editable = true }
vocal-remover = { git = "https://github.com/Japan7/vocal-remover.git", branch = "6.0.0b4" }

[feature.cpu]
platforms = ["linux-64", "win-64"]

[feature.cpu.pypi-dependencies]
torch = { version = "==2.13.0", index = "https://download.pytorch.org/whl/cpu" }
torchaudio = { version = "==2.11.0", index = "https://download.pytorch.org/whl/cpu" }
torchcodec = { version = "==0.14.0", index = "https://download.pytorch.org/whl/cpu" }

[feature.cu126]
platforms = ["linux-64", "win-64"]
system-requirements = { cuda = "12.6" }

[feature.cu126.pypi-dependencies]
torch = { version = "==2.13.0", index = "https://download.pytorch.org/whl/cu126" }
torchaudio = { version = "==2.11.0", index = "https://download.pytorch.org/whl/cu126" }
torchcodec = { version = "==0.14.0", index = "https://download.pytorch.org/whl/cu126" }

[feature.cu130]
platforms = ["linux-64", "win-64"]
system-requirements = { cuda = "13.0" }

[feature.cu130.pypi-dependencies]
torch = { version = "==2.13.0", index = "https://download.pytorch.org/whl/cu130" }
torchaudio = { version = "==2.11.0", index = "https://download.pytorch.org/whl/cu130" }
torchcodec = { version = "==0.14.0", index = "https://download.pytorch.org/whl/cu130" }

[environments]
cpu = ["cpu"]
cu126 = ["cu126"]
cu130 = ["cu130"]
